<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#060e2e"/>
  <!-- Stars small -->
  <circle cx="80"  cy="90"  r="4" fill="#e2e8ff" opacity="0.8"/>
  <circle cx="200" cy="60"  r="3" fill="#e2e8ff" opacity="0.6"/>
  <circle cx="380" cy="100" r="5" fill="#e2e8ff" opacity="0.9"/>
  <circle cx="440" cy="60"  r="3" fill="#e2e8ff" opacity="0.7"/>
  <circle cx="130" cy="150" r="2.5" fill="#e2e8ff" opacity="0.5"/>
  <circle cx="340" cy="50"  r="2" fill="#e2e8ff" opacity="0.5"/>
  <circle cx="460" cy="160" r="3" fill="#e2e8ff" opacity="0.6"/>
  <circle cx="60"  cy="200" r="2" fill="#e2e8ff" opacity="0.4"/>
  <!-- Moon crescent -->
  <circle cx="256" cy="256" r="130" fill="#c8d8f0"/>
  <circle cx="310" cy="210" r="120" fill="#060e2e"/>
  <!-- Horizon arc -->
  <path d="M60 380 Q256 320 452 380" stroke="#fbbf24" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.85"/>
  <!-- N cardinal marker -->
  <text x="256" y="450" font-family="system-ui,sans-serif" font-size="52" font-weight="bold" fill="#fbbf24" text-anchor="middle" opacity="0.9">N</text>
</svg>
